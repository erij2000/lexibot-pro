          value: "ar"
      text: "شكراً لملاحظاتك الإيجابية!"

  utter_feedback_negative:
    - condition:
        - type: slot
          name: chosen_language
          value: "fr"
      text: "Désolé d’entendre cela. Comment puis-je améliorer?"
    - condition:
        - type: slot
          name: chosen_language
          value: "en"
      text: "Sorry to hear that. How can I improve?"
    - condition:
        - type: slot
          name: chosen_language
          value: "ar"
      text: "آسف لسماع ذلك. كيف يمكنني التحسين؟"

  utter_iamabot:
    - condition:
        - type: slot
          name: chosen_language
