  utter_client_file_status:
    - condition:
        - type: slot
          name: chosen_language
          value: "fr"
      text: "Voici le statut de votre dossier client."
    - condition:
        - type: slot
          name: chosen_language
          value: "en"
      text: "Here is your client file status."
    - condition:
        - type: slot
          name: chosen_language
          value: "ar"
      text: "هذا هو حالة ملف العميل الخاص بك."

  utter_ask_legal_question:
    - condition:
        - type: slot
          name: chosen_language
          value: "fr"
      text: "Quelle question juridique avez-vous?"
    - condition:
        - type: slot
          name: chosen_language
          value: "en"
      text: "What legal question do you have?"
    - condition:
        - type: slot
          name: chosen_language
          value: "ar"
      text: "ما هو السؤال القانوني الذي لديك؟"

  utter_out_of_scope:
    - condition:
        - type: slot
          name: chosen_language
          value: "fr"
      text: "Désolé, je ne peux pas répondre à cette question."
    - condition:
        - type: slot
          name: chosen_language
