          name: chosen_language
          value: "en"
      text: "Our office is located in Tunis, Tunisia."
    - condition:
        - type: slot
          name: chosen_language
          value: "ar"
      text: "يقع مكتبنا في تونس، تونس."

  utter_faq_services:
    - condition:
        - type: slot
          name: chosen_language
          value: "fr"
      text: "Nous offrons des services juridiques en divorce, héritage, contrats, et plus."
    - condition:
        - type: slot
          name: chosen_language
          value: "en"
      text: "We provide legal services in divorce, inheritance, contracts, and more."
    - condition:
        - type: slot
          name: chosen_language
          value: "ar"
      text: "نحن نقدم خدمات قانونية في الطلاق، الميراث، العقود، والمزيد."

  utter_language_change_confirm:
    - text: "Langue changée avec succès."

  utter_clarify:
    - text: "Pouvez-vous préciser votre question ?"

actions:
  - action_lexibot
  - action_chat_ollama
  - action_answer_legal_question



   