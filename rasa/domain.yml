version: "3.1"

slots:
  chosen_language:
    type: text
    initial_value: "fr"
    influence_conversation: false
    mappings:
      - type: from_text

intents:
  - greet
  - goodbye
  - affirm
  - deny
  - ask_legal_question
  - feedback_positive
  - feedback_negative
  - language_change
  - out_of_scope
  - prendre_rdv
  - cancel_rdv
  - cheer_up
  - fees_info
  - client_file_status
  - clarify
  - faq_location
  - faq_services
  - iamabot
  - legal_advice_divorce
  - legal_advice_inheritance
  - court_documents_help
  - bot_challenge
  - ask_via_ollama
  - clarify_question
  - language_change_request
  - mood_great
  - mood_unhappy
  - inform

responses:
  utter_greet:
    - condition:
        - type: slot
          name: chosen_language
          value: "fr"
      text: "Bonjour ! 👋 Je suis Lexibot, votre assistant juridique."
    - condition:
        - type: slot
          name: chosen_language
          value: "en"
      text: "Hello! 👋 I’m Lexibot, your legal assistant."
    - condition:
        - type: slot
          name: chosen_language
          value: "ar"
      text: "مرحباً! 👋 أنا ليكسيبوت، مساعدك القانوني."

  utter_goodbye:
    - condition:
        - type: slot
          name: chosen_language
          value: "fr"
      text: "Au revoir ! 👋 Prenez soin de vous."
    - condition:
        - type: slot
          name: chosen_language
          value: "en"
      text: "Goodbye! 👋 Take care."
    - condition:
        - type: slot
          name: chosen_language
          value: "ar"
      text: "مع السلامة! 👋 اعتنِ بنفسك."

  utter_happy:
    - condition:
        - type: slot
          name: chosen_language
          value: "fr"
      text: "Je suis heureux de pouvoir vous aider!"
    - condition:
        - type: slot
          name: chosen_language
          value: "en"
      text: "I’m happy to help you!"
    - condition:
        - type: slot
          name: chosen_language
          value: "ar"
      text: "أنا سعيد لمساعدتك!"

  utter_cheer_up:
    - condition:
        - type: slot
          name: chosen_language
          value: "fr"
      text: "Courage! Tout ira bien."
    - condition:
        - type: slot
          name: chosen_language
          value: "en"
      text: "Cheer up! Everything will be fine."
    - condition:
        - type: slot
          name: chosen_language
          value: "ar"
      text: "تشجع! كل شيء سيكون على ما يرام."

  utter_did_that_help:
    - condition:
        - type: slot
          name: chosen_language
          value: "fr"
      text: "Est-ce que cela vous a aidé?"
    - condition:
        - type: slot
          name: chosen_language
          value: "en"
      text: "Did that help you?"
    - condition:
        - type: slot
          name: chosen_language
          value: "ar"
      text: "هل ساعدك ذلك؟"

  utter_fees_info:
    - condition:
        - type: slot
          name: chosen_language
          value: "fr"
      text: "Voici les informations sur nos honoraires."
    - condition:
        - type: slot
          name: chosen_language
          value: "en"
      text: "Here is information about our fees."
    - condition:
        - type: slot
          name: chosen_language
          value: "ar"
      text: "إليك معلومات عن رسومنا."

  utter_legal_advice_divorce:
    - condition:
        - type: slot
          name: chosen_language
          value: "fr"
      text: "Conseils juridiques sur le divorce."
    - condition:
        - type: slot
          name: chosen_language
          value: "en"
      text: "Legal advice about divorce."
    - condition:
        - type: slot
          name: chosen_language
          value: "ar"
      text: "نصائح قانونية حول الطلاق."

  utter_legal_advice_inheritance:
    - condition:
        - type: slot
          name: chosen_language
          value: "fr"
      text: "Conseils juridiques sur l'héritage."
    - condition:
        - type: slot
          name: chosen_language
          value: "en"
