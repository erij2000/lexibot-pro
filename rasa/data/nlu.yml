# 🤖 Identity & clarification
- intent: bot_challenge
  examples: |
    - es-tu un robot ?
    - suis-je en train de parler à une IA ?
    - es-tu humain ?
    - qui es-tu ?
    - es-tu Lexibot ?
    - am I talking to a bot?

- intent: iamabot
  examples: |
    - Qui es-tu ?
    - Es-tu une IA ?
    - Are you a bot?

- intent: clarify
  examples: |
    - Je ne comprends pas
    - Peux-tu reformuler ?
    - C'est trop vague
    - Pouvez-vous préciser ?
    - peux-tu clarifier ?
    - je n’ai pas compris
    - répète s’il te plaît
    - explique encore une fois
    - clarifie ta réponse

# 📚 Legal advice intents
- intent: legal_advice_divorce
  examples: |
    - comment divorcer en Tunisie ?
    - quelles sont les procédures de divorce ?
    - quels documents dois-je fournir pour un divorce ?
    - هل يمكنني الطلاق بدون محكمة ؟

- intent: legal_advice_inheritance
  examples: |
    - quelles sont les règles d'héritage ?
    - comment se partage l'héritage ?
    - inheritance law in Tunisia
    - هل يمكنني معرفة قوانين الإرث في تونس ؟

- intent: court_documents_help
  examples: |
    - de quels documents ai-je besoin pour une audience ?
    - que dois-je apporter au tribunal ?
    - هل أحتاج إلى وثائق للمحكمة ؟

- intent: ask_legal_question
  examples: |
    - Quels sont les documents nécessaires pour demander un divorce ?
    - ما هي إجراءات الطلاق في تونس؟
    - How to file a complaint against someone in Tunisia?
    - ما هي حقوق الزوجة بعد الطلاق؟
    - I want to open a company
    - Quelle est la loi sur ce sujet ?
    - Quels sont mes droits dans cette situation ?

