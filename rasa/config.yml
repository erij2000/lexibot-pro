recipe: default.v1
assistant_id: 20250702-142557-sweet-act
language: fr

pipeline:
  - name: WhitespaceTokenizer
    intent_tokenization_flag: False
  - name: CountVectorsFeaturizer
    analyzer: word
    lowercase: True
    min_ngram: 1
    max_ngram: 1
  - name: CountVectorsFeaturizer
    analyzer: char_wb
    lowercase: True
    min_ngram: 3
    max_ngram: 5
  - name: LexicalSyntacticFeaturizer
  - name: DIETClassifier
    epochs: 100
    learning_rate: 0.002
    number_of_transformer_layers: 2
    transformer_size: 128  # REDUCED from 256
    drop_rate: 0.25
    weight_sparsity: 0.8
  - name: EntitySynonymMapper
  - name: FallbackClassifier
    threshold: 0.3
    ambiguity_threshold: 0.1
    fallback_intent_name: "out_of_scope"

policies:
  - name: RulePolicy
    core_fallback_threshold: 0.3
    core_fallback_action_name: "action_chat_ollama"
    enable_fallback_prediction: True
  - name: MemoizationPolicy
    max_history: 5
  - name: TEDPolicy
    max_history: 5
    epochs: 100
    constrain_similarities: True

training:
  validate: True




