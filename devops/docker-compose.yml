

services:
  # -------------------------------
  # 1. PostgreSQL Database
  # -------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: lexibot_postgres
    environment:
      POSTGRES_USER: erij_user
      POSTGRES_PASSWORD: super_secret_erij_mdp
      POSTGRES_DB: lexibot_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lexibot_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erij_user -d lexibot_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------
  # 2. FASTAPI Backend (🔥 FIXED)
  # -------------------------------
  backend:
    build:
      context: ..
      dockerfile: devops/docker/backend.Dockerfile
    container_name: lexibot_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://erij_user:super_secret_erij_mdp@postgres:5432/lexibot_db
      JWT_SECRET: MY_SUPER_SECRET_KEY
      OLLAMA_URL: http://host.docker.internal:11434
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app   # 🔥 LIVE CODE (NO REBUILD)
    networks:
      - lexibot_network
    restart: unless-stopped
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload  # 🔥 AUTO RELOAD
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------
  # 3. Rasa Server
  # -------------------------------
  rasa:
    build:
      context: ..
      dockerfile: devops/docker/rasa.Dockerfile
    container_name: lexibot_rasa
    ports:
      - "5005:5005"
    networks:
      - lexibot_network
    volumes:
      - ../rasa:/app
    command: rasa run --enable-api --cors "*" --debug
    restart: unless-stopped

  # -------------------------------
  # 4. Rasa Actions Server
  # -------------------------------
  rasa_actions:
    build:
      context: ..
      dockerfile: devops/docker/rasaActions.Dockerfile
    container_name: lexibot_rasa_actions
    ports:
      - "5055:5055"
    networks:
      - lexibot_network
    volumes:
      - ../rasa/actions:/app/actions
    command: python -m rasa_sdk --actions actions
    depends_on:
      - rasa
    restart: unless-stopped

  # -------------------------------
  # 5. Streamlit Frontend
  # -------------------------------
  frontend:
    build:
      context: ..
      dockerfile: devops/docker/frontend.Dockerfile
    container_name: lexibot_frontend
    ports:
      - "8501:8501"
    networks:
      - lexibot_network
    volumes:
      - ../frontend:/app
    command: streamlit run lexibot_app.py --server.address=0.0.0.0
    depends_on:
      - backend
      - rasa
    restart: unless-stopped

# -------------------------------
# Volumes & Networks
# -------------------------------
volumes:
  postgres_data:

networks:
  lexibot_network:
    driver: bridge